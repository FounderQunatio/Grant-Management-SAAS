name: GovGuard CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-gov-west-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: govguard_test
          POSTGRES_USER: govguard_app
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: cd backend && ruff check .

      - name: Type check (mypy)
        run: cd backend && mypy . --ignore-missing-imports --no-error-summary || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://govguard_app:testpass@localhost:5432/govguard_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          COGNITO_USER_POOL_ID: test-pool
          COGNITO_CLIENT_ID: test-client
        run: |
          cd backend
          pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=60

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml

  # ── Frontend Tests ─────────────────────────────────────────────────────
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Lint
        run: cd frontend && npm run lint || true

      - name: Build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Docker Build & Push (main branch only) ────────────────────────────
  build-and-push:
    needs: [backend-test, frontend-test]
    if: github.ref == "refs/heads/main"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        env:
          SHA: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/govguard-backend:$SHA ./backend
          docker push $ECR_REGISTRY/govguard-backend:$SHA
          docker tag $ECR_REGISTRY/govguard-backend:$SHA $ECR_REGISTRY/govguard-backend:latest
          docker push $ECR_REGISTRY/govguard-backend:latest

  # ── Deploy to Production ───────────────────────────────────────────────
  deploy-prod:
    needs: build-and-push
    if: github.ref == "refs/heads/main"
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS (rolling, zero-downtime)
        env:
          SHA: ${{ github.sha }}
        run: |
          aws ecs update-service             --cluster govguard-prod             --service govguard-backend             --force-new-deployment             --deployment-configuration "minimumHealthyPercent=50,maximumPercent=200"
          aws ecs wait services-stable --cluster govguard-prod --services govguard-backend

      - name: Smoke tests
        run: |
          sleep 30
          curl -f https://api.govguard.gov/health || exit 1
          echo "Deployment successful"
